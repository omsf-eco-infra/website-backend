name: Terraform

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

jobs:
  support-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.9.3
        with:
          pixi-version: v0.63.0
          environments: dev
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Run local OpenTofu support smoke test
        run: pixi run -e dev test-tf-support-smoke

  ci-smoke:
    runs-on: ubuntu-latest
    needs: support-smoke
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')

    permissions:
      contents: read
      id-token: write

    env:
      TF_IN_AUTOMATION: "true"
      TF_VAR_owner: ${{ github.repository_owner }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.9.3
        with:
          pixi-version: v0.63.0
          environments: dev
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5.1.1
        with:
          role-to-assume: ${{ secrets.AWS_GHA_TEST_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: website-backend-ci-${{ github.run_id }}

      - name: Run real-AWS OpenTofu CI smoke test
        run: pixi run -e dev test-tf-ci-smoke
